<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"> <!-- Circular badge with gold border --> <circle cx="200" cy="200" r="180" fill="#1B3A52" stroke="#DAA520" stroke-width="8"/> <!-- Radio tower/antenna --> <line x1="200" y1="120" x2="200" y2="80" stroke="#DAA520" stroke-width="6" stroke-linecap="round"/> <!-- Radio waves (curved) --> <path d="M 160 140 Q 200 115, 240 140" stroke="#DAA520" stroke-width="5" fill="none" stroke-linecap="round"/> <path d="M 140 165 Q 200 120, 260 165" stroke="#DAA520" stroke-width="5" fill="none" stroke-linecap="round"/> <path d="M 120 190 Q 200 125, 280 190" stroke="#DAA520" stroke-width="5" fill="none" stroke-linecap="round"/> <!-- FM text in badge with more padding --> <text x="200" y="245" font-family="Arial Black, sans-serif" font-size="56" fill="#DAA520" text-anchor="middle" font-weight="900">FM</text> <!-- LONG HAUL text below with more padding --> <text x="200" y="310" font-family="Arial Black, sans-serif" font-size="42" fill="#FFFFFF" text-anchor="middle" font-weight="900" letter-spacing="2">LONG HAUL</text> </svg>